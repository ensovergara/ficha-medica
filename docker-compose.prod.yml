services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/fichamedica-backend:latest
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      - nginx-wait

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/fichamedica-frontend:latest
    restart: always
    ports:
      - "3000:3000"
    env_file: .env

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

  # Truco para esperar que nginx esté listo antes del healthcheck del backend
  nginx-wait:
    image: alpine
    command: echo "ok"

volumes:
  pgdata:
